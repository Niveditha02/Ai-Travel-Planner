services:
  # ---------------------------------------------------------------------------
  # Backend: Node.js Express API
  # ---------------------------------------------------------------------------
  - type: web
    name: ai-travel-planner-api
    runtime: node
    plan: free
    region: oregon
    rootDir: backend
    buildCommand: npm install
    startCommand: node index.js
    envVars:
      - key: PORT
        value: 10000
      - key: MONGO_URL
        sync: false # Set this in Render Dashboard
      - key: OPENROUTER_API_KEY
        sync: false # Set this in Render Dashboard
      - key: NODE_ENV
        value: production

  # ---------------------------------------------------------------------------
  # Frontend: React Vite Static Site
  # ---------------------------------------------------------------------------
  - type: web
    name: ai-travel-planner-web
    runtime: static
    rootDir: frontend
    buildCommand: npm install --include=optional && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_BACKEND_URL
        value: https://ai-travel-planner-api-340p.onrender.com
      - key: VITE_GEOAPIFY_API_KEY
        sync: false # Set this in Render Dashboard
      - key: VITE_GOOGLE_AUTH_CLIENT_ID
        sync: false # Set this in Render Dashboard
      - key: VITE_UNSPLASH_ACCESS_KEY
        sync: false # Set this in Render Dashboard
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
